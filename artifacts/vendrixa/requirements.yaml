packages:
  "framer-motion": "For cinematic page transitions and scroll animations required for luxury feel"
  "react-hook-form": "For complex real estate listing forms with live preview"
  "@hookform/resolvers": "For Zod form validation integration"
  "lucide-react": "For premium minimalist icons"

images:
  - path: "artifacts/vendrixa/public/images/hero-bg.png"
    description: "Cinematic dark architectural photography of a luxury modern mansion at night with warm interior lighting, extreme high quality, editorial style, 8k"
    aspect_ratio: "16:9"
  - path: "artifacts/vendrixa/public/images/placeholder-property.png"
    description: "Minimalist luxury real estate exterior photography, modern concrete and glass architecture, moody lighting, highly detailed"
    aspect_ratio: "16:9"

notes:
  - Uses local hooks in src/hooks/ for API calls (useListings, useAuth).
  - Dark mode by default for the luxury cinematic aesthetic.
