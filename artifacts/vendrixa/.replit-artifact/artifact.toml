kind = "web"
previewPath = "/"
title = "Vendrixa"
version = "1.0.0"
id = "artifacts/vendrixa"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23883

[services.development]
run = "pnpm --filter vendrixa run dev"

[services.production]
build = [ "pnpm", "--filter", "vendrixa", "run", "build" ]
publicDir = "artifacts/vendrixa/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23883"
BASE_PATH = "/"
