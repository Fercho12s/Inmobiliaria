services:
  - type: web
    name: vendrixa-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /api/listings
    envVars:
      - key: OUTPUT_DIR
        value: /app/data/generated
      - key: REMOTION_CHROME_EXECUTABLE
        value: /usr/local/bin/chromium-sandbox-wrapper
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: vendrixa-db
          property: connectionString

databases:
  - name: vendrixa-db
    plan: free
