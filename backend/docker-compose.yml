services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - app_data:/app/data
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/vendrixa.db
      - OUTPUT_DIR=/app/data/generated
      - REMOTION_CHROME_EXECUTABLE=/usr/bin/chromium

volumes:
  app_data:
