services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./generated:/app/data/generated        # uploads, imágenes, carruseles, PDFs, videos
      - ./vendrixa.db:/app/data/vendrixa.db    # base de datos persistente
    env_file:
      - .env
    environment:
      - DB_PATH=/app/data/vendrixa.db
      - OUTPUT_DIR=/app/data/generated
      - REMOTION_CHROME_EXECUTABLE=/usr/local/bin/chromium-sandbox-wrapper
      # Para permitir el sitio deployed, agregar en .env: ALLOWED_ORIGINS=https://tu-dominio.com
